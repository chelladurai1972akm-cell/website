<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>My Campaigns</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">


    <style>
        body {
            background: #f5f7fb;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Header */

        .page-header {
            margin-bottom: 25px;
        }

        .page-header h3 {
            font-weight: 600;
        }

        .page-header p {
            color: #6b7280;
        }


        /* Card */

        .campaign-card {
            background: white;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            transition: .3s;
        }

        .campaign-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
        }


        /* Image */

        .campaign-img {
            height: 180px;
            position: relative;
            overflow: hidden;
        }

        .campaign-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }


        /* Status */

        .status-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            color: white;
            font-size: 12px;
            font-weight: 600;
        }

        .active {
            background: #22c55e;
        }

        .expired {
            background: #ef4444;
        }

        .pending {
            background: #f59e0b;
        }


        /* Body */

        .campaign-body {
            padding: 15px;
        }

        .campaign-title {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .campaign-desc {
            color: #6b7280;
            font-size: 13px;
            margin-bottom: 10px;
            height: 35px;
            overflow: hidden;
        }


        /* Meta */

        .campaign-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .price {
            font-weight: 700;
            font-size: 16px;
            color: #4f46e5;
        }

        .audience {
            font-size: 12px;
            color: #6b7280;
            background: #f1f5f9;
            padding: 3px 8px;
            border-radius: 6px;
        }


        .expiry {
            font-size: 12px;
            color: #6b7280;
        }
    </style>

</head>


<body>

    <div class="container-fluid p-4">

        <!-- Header -->

        <div class="page-header">

            <h3>My Campaigns</h3>
            <p>View all your created campaigns</p>

        </div>


        <div class="row" id="campaignGrid">

        </div>

    </div>


    <script>

        const user = JSON.parse(localStorage.getItem("user"));

        if (!user) {
            window.location.href = "../auth/login.html";
        }

        const marketerId = user.id;


        async function loadCampaigns() {

            const res = await fetch(
                `http://localhost:5001/api/marketer/campaigns/${marketerId}`
            );

            const campaigns = await res.json();

            console.log("Campaigns:", campaigns);

            renderCampaigns(campaigns);

        }



        function renderCampaigns(campaigns) {

            const grid = document.getElementById("campaignGrid");

            grid.innerHTML = "";

            campaigns.forEach(campaign => {

                grid.innerHTML += `

<div class="col-xl-3 col-lg-4 col-md-6 mb-4">

<div class="campaign-card">

<div class="campaign-img">

<img src="http://localhost:5001/uploads/${campaign.image}">

<span class="status-badge ${campaign.status.toLowerCase()}">

${campaign.status}

</span>

</div>


<div class="campaign-body">

<div class="campaign-title">

${campaign.campaign_name}

</div>

<div class="campaign-desc">

${campaign.description}

</div>


<div class="campaign-meta">

<div class="price">

₹ ${campaign.price}

</div>

<div class="audience">

${campaign.target_audience}

</div>

</div>


<div class="expiry">

Expiry : ${formatDate(campaign.expiry_date)}

</div>


</div>

</div>

</div>

`;

            });

        }



        function formatDate(date) {

            return new Date(date).toLocaleDateString();

        }


        loadCampaigns();

    </script>


</body>

</html>
