<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Create Campaign</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

body {
background: #f5f7fb;
font-family: 'Segoe UI', sans-serif;
}

/* Header */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

/* Card */

.campaign-container {
max-width:650px;
margin:auto;
background:white;
padding:30px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

/* Labels */

.form-label{
font-weight:600;
color:#374151;
}

/* Inputs */

.form-control{
border-radius:10px;
padding:10px 12px;
}

.form-control:focus{
box-shadow:0 0 0 2px #6366f1;
border-color:#6366f1;
}

/* Buttons */

.create-btn {
background: linear-gradient(135deg,#6366f1,#4f46e5);
border:none;
padding:12px;
font-weight:600;
border-radius:10px;
}

.create-btn:hover{
background: linear-gradient(135deg,#4f46e5,#4338ca);
}

.back-btn{
background:#eef2ff;
color:#4f46e5;
border:none;
padding:8px 16px;
border-radius:8px;
font-weight:600;
}

.back-btn:hover{
background:#e0e7ff;
}

/* Icon spacing */

.input-group-text{
background:#f1f5ff;
border-radius:10px 0 0 10px;
}

</style>

</head>

<body>

<div class="container py-4">

<div class="header">

<h3 class="fw-bold">
<i class="fa fa-bullhorn text-primary me-2"></i>
Create Campaign
</h3>

<button 
class="back-btn"
onclick="window.location.href='dashboard.html'"
>
<i class="fa fa-arrow-left"></i> Back
</button>

</div>


<div class="campaign-container">

<form id="campaignForm">

<!-- Campaign Name -->

<div class="mb-3">
<label class="form-label">Campaign Name</label>

<div class="input-group">
<span class="input-group-text">
<i class="fa fa-bullhorn"></i>
</span>
<input type="text" id="campaign_name" class="form-control" required>
</div>

</div>


<!-- Description -->

<div class="mb-3">
<label class="form-label">Description</label>

<div class="input-group">
<span class="input-group-text">
<i class="fa fa-align-left"></i>
</span>
<textarea id="description" class="form-control" required></textarea>
</div>

</div>


<!-- Price -->

<div class="mb-3">
<label class="form-label">Price</label>

<div class="input-group">
<span class="input-group-text">
<i class="fa fa-rupee-sign"></i>
</span>
<input type="number" id="price" class="form-control" required>
</div>

</div>


<!-- Target Audience -->

<div class="mb-3">
<label class="form-label">Target Audience</label>

<div class="input-group">
<span class="input-group-text">
<i class="fa fa-users"></i>
</span>
<input type="text" id="target_audience" class="form-control" required>
</div>

</div>


<!-- Expiry -->

<div class="mb-3">
<label class="form-label">Expiry Date</label>

<div class="input-group">
<span class="input-group-text">
<i class="fa fa-calendar"></i>
</span>
<input type="datetime-local" id="expiry_date" class="form-control" required>
</div>

</div>


<!-- Image -->

<div class="mb-4">
<label class="form-label">Campaign Image</label>

<div class="input-group">
<span class="input-group-text">
<i class="fa fa-image"></i>
</span>
<input type="file" id="image" class="form-control" required>
</div>

</div>


<button type="submit" class="btn create-btn w-100">

<i class="fa fa-plus-circle me-2"></i>
Create Campaign

</button>

</form>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="./js/create-campaign.js"></script>

</body>

</html>
