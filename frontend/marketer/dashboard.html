<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Marketer Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Header */

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        /* Cards */

        .stat-card {
            border: none;
            border-radius: 14px;
            transition: .2s;
            color: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        /* Card Colors */

        .card-blue {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
        }

        .card-green {
            background: linear-gradient(135deg, #22c55e, #16a34a);
        }

        .card-orange {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }

        .card-purple {
            background: linear-gradient(135deg, #a855f7, #7c3aed);
        }

        .card-pink {
            background: linear-gradient(135deg, #ec4899, #db2777);
        }

        .card-cyan {
            background: linear-gradient(135deg, #06b6d4, #0891b2);
        }

        .card-teal {
            background: linear-gradient(135deg, #14b8a6, #0d9488);
        }

        .card-red {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .card-yellow {
            background: linear-gradient(135deg, #eab308, #ca8a04);
        }

        .card-gray {
            background: linear-gradient(135deg, #6b7280, #4b5563);
        }

        .stat-title {
            font-size: 13px;
            opacity: .9;
        }

        .stat-value {
            font-size: 26px;
            font-weight: 700;
        }

        /* icon */

        .card-icon {
            font-size: 22px;
            opacity: .9;
        }

        /* table */

        .table-card {
            border: none;
            border-radius: 14px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .table thead {
            background: #f8f9fc;
        }

        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
        }

        .logout-btn:hover {
            background: #dc2626;
        }

        /* Modern Table */

        .modern-table {
            border-radius: 12px;
            overflow: hidden;
        }

        .modern-table thead {
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            color: white;
        }

        .modern-table thead th {
            font-weight: 600;
            border: none;
            padding: 14px;
        }

        .modern-table tbody tr {
            transition: .2s;
        }

        .modern-table tbody tr:hover {
            background: #f1f5ff;
            transform: scale(1.002);
        }

        .modern-table tbody td {
            padding: 14px;
            border-bottom: 1px solid #f1f3f6;
        }

        /* Colored Numbers */

        .modern-table tbody td:nth-child(2) {
            color: #3b82f6;
            font-weight: 600;
        }

        .modern-table tbody td:nth-child(3) {
            color: #f59e0b;
            font-weight: 600;
        }

        .modern-table tbody td:nth-child(4) {
            color: #8b5cf6;
            font-weight: 600;
        }

        .modern-table tbody td:nth-child(5) {
            color: #10b981;
            font-weight: 600;
        }

        .modern-table tbody td:nth-child(6) {
            color: #ec4899;
            font-weight: 600;
        }

        /* Card Shadow */

        .table-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }
    </style>

</head>

<body>

    <div class="container-fluid p-4">

        <!-- Header -->

        <div class="dashboard-header">

            <h3 class="fw-bold">Marketer Dashboard</h3>

            <div>

                <button class="btn btn-primary me-2" onclick="window.location.href='create-campaign.html'">

                    <i class="fa fa-plus"></i> Create Campaign

                </button>

                <button class="btn btn-primary me-2" onclick="window.location.href='my-campaigns.html'">
                    <i class="fa fa-layer-group"></i> My Campaigns
                </button>

                <button class="btn logout-btn" onclick="logout()">

                    <i class="fa fa-sign-out-alt"></i> Logout

                </button>

            </div>

        </div>


        <!-- Stats Cards -->

        <div class="row g-3">

            <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
                <div class="card stat-card card-blue p-3">
                    <i class="fa fa-bullhorn card-icon"></i>
                    <div class="stat-title">Total Campaigns</div>
                    <div class="stat-value" id="totalCampaigns">0</div>
                </div>
            </div>

            <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
                <div class="card stat-card card-green p-3">
                    <i class="fa fa-eye card-icon"></i>
                    <div class="stat-title">Views</div>
                    <div class="stat-value" id="views">0</div>
                </div>
            </div>

            <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
                <div class="card stat-card card-orange p-3">
                    <i class="fa fa-mouse-pointer card-icon"></i>
                    <div class="stat-title">Clicks</div>
                    <div class="stat-value" id="clicks">0</div>
                </div>
            </div>

            <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
                <div class="card stat-card card-purple p-3">
                    <i class="fa fa-user-plus card-icon"></i>
                    <div class="stat-title">Leads</div>
                    <div class="stat-value" id="leads">0</div>
                </div>
            </div>

            <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
                <div class="card stat-card card-pink p-3">
                    <i class="fa fa-chart-line card-icon"></i>
                    <div class="stat-title">Conversions</div>
                    <div class="stat-value" id="conversions">0</div>
                </div>
            </div>

            <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
                <div class="card stat-card card-cyan p-3">
                    <i class="fa fa-heart card-icon"></i>
                    <div class="stat-title">Likes</div>
                    <div class="stat-value" id="likes">0</div>
                </div>
            </div>

            <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
                <div class="card stat-card card-teal p-3">
                    <i class="fa fa-check-circle card-icon"></i>
                    <div class="stat-title">Approved</div>
                    <div class="stat-value" id="approved">0</div>
                </div>
            </div>

            <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
                <div class="card stat-card card-yellow p-3">
                    <i class="fa fa-clock card-icon"></i>
                    <div class="stat-title">Pending</div>
                    <div class="stat-value" id="pending">0</div>
                </div>
            </div>

            <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
                <div class="card stat-card card-red p-3">
                    <i class="fa fa-times-circle card-icon"></i>
                    <div class="stat-title">Rejected</div>
                    <div class="stat-value" id="rejected">0</div>
                </div>
            </div>

            <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
                <div class="card stat-card card-gray p-3">
                    <i class="fa fa-calendar-times card-icon"></i>
                    <div class="stat-title">Expired</div>
                    <div class="stat-value" id="expired">0</div>
                </div>
            </div>

        </div>


        <!-- Table -->

        <div class="card table-card mt-4">

            <div class="card-header bg-white border-0 d-flex justify-content-between align-items-center">

                <h5 class="fw-bold mb-0">
                    <i class="fa fa-chart-bar text-primary me-2"></i>
                    Campaign Performance
                </h5>

                <span class="badge bg-primary-subtle text-primary px-3 py-2">
                    Analytics
                </span>

            </div>

            <div class="card-body pt-0">

                <div class="table-responsive">

                    <table class="table table-hover align-middle modern-table">

                        <thead>

                            <tr>
                                <th>Campaign</th>
                                <th>Views</th>
                                <th>Clicks</th>
                                <th>Leads</th>
                                <th>Conversions</th>
                                <th>Likes</th>
                            </tr>

                        </thead>

                        <tbody id="campaignTable">

                        </tbody>

                    </table>

                </div>

            </div>

        </div>
    </div>


    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


    <!-- Internal JS -->

    <script>

        function logout() {

            localStorage.removeItem("token");
            localStorage.removeItem("user");

            window.location.href = "../auth/login.html";

        }
    </script>
    <script src="./js/dashboard.js"></script>

</body>

</html>
