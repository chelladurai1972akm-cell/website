<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DMCMS Register</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
        }

        .register-card {
            width: 520px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .logo {
            font-size: 26px;
            font-weight: 600;
            color: #2a5298;
        }
    </style>

</head>

<body>

    <div class="card register-card p-4">

        <div class="text-center mb-3">
            <div class="logo">DMCMS</div>
            <p class="text-muted">Create your account</p>
        </div>

        <form id="registerForm">

            <!-- Name -->
            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label">First Name</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-person"></i>
                        </span>
                        <input id="firstName" type="text" class="form-control" placeholder="First name">
                    </div>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Last Name</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-person"></i>
                        </span>
                        <input id="lastName" type="text" class="form-control" placeholder="Last name">
                    </div>
                </div>

            </div>

            <!-- Role -->
            <div class="mb-3">
                <label class="form-label">User Role</label>
                <select id="role" class="form-select">
                    <option value="">Select Role</option>
                    <option value="Marketer">Marketer</option>
                    <option value="User">User</option>
                </select>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label">Email</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-envelope"></i>
                    </span>
                    <input id="email" type="email" class="form-control" placeholder="Enter email">
                </div>
            </div>

            <!-- Phone -->
            <div class="mb-3">
                <label class="form-label">Phone</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-telephone"></i>
                    </span>
                    <input id="phone" type="text" class="form-control" placeholder="Enter phone number">
                </div>
            </div>

            <!-- Password -->
            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-lock"></i>
                        </span>
                        <input id="password" type="password" class="form-control" placeholder="Password">
                    </div>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Confirm Password</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-lock-fill"></i>
                        </span>
                        <input id="confirmPassword" type="password" class="form-control" placeholder="Confirm Password">
                    </div>
                </div>

            </div>

            <!-- Register Button -->
            <button type="submit" class="btn btn-primary w-100 mb-3">
                <i class="bi bi-person-plus"></i>
                Register
            </button>

            <!-- Login -->
            <div class="text-center">
                Already have account?
                <a href="login.html">Login</a>
            </div>

        </form>

    </div>

    <!-- JS -->
    <script src="js/register.js"></script>

</body>

</html>
