<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Campaign Approval | Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
background:#f5f6fa;
font-family: Arial, Helvetica, sans-serif;
}

/* Sidebar */

.sidebar{
width:250px;
height:100vh;
background:#1e3c72;
position:fixed;
color:white;
padding:20px;
}

.sidebar ul{
list-style:none;
padding:0;
}

.sidebar ul li{
padding:12px;
cursor:pointer;
border-radius:6px;
margin-bottom:8px;
}

.sidebar ul li:hover{
background:#2a5298;
}

.main{
margin-left:250px;
padding:20px;
}

.topbar{
background:white;
padding:15px;
border-radius:8px;
margin-bottom:20px;
}

</style>

</head>

<body>


<!-- Sidebar -->
<div class="sidebar">

<h4>DMCMS</h4>

<ul>

<li onclick="go('dashboard.html')">
<i class="bi bi-speedometer2"></i> Dashboard
</li>

<li onclick="go('users.html')">
<i class="bi bi-people"></i> Users
</li>

<li class="bg-primary">
<i class="bi bi-megaphone"></i> Campaigns
</li>

<li onclick="logout()">
<i class="bi bi-box-arrow-right"></i> Logout
</li>

</ul>

</div>



<!-- Main -->
<div class="main">

<div class="topbar">
<h5>Campaign Approval</h5>
</div>


<div class="card">

<div class="card-body">

<table class="table table-hover">

<thead>

<tr>
<th>ID</th>
<th>Campaign</th>
<th>Marketer</th>
<th>Price</th>
<th>Status</th>
<th>Post To</th>
<th>Action</th>
</tr>

</thead>

<tbody id="campaignTable">

</tbody>

</table>

</div>

</div>

</div>



<script src="js/campaigns.js"></script>

<script>

function logout(){
localStorage.removeItem("token");
localStorage.removeItem("user");
window.location.href="../auth/login.html";
}

function go(page){
window.location.href=page;
}

</script>

</body>

</html>
