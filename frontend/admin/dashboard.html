<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard | DMCMS</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #f5f6fa;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* Sidebar */

        .sidebar {
            width: 250px;
            height: 100vh;
            background: #1e3c72;
            position: fixed;
            color: white;
            padding: 20px;
        }

        .sidebar h4 {
            margin-bottom: 30px;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
        }

        .sidebar ul li {
            padding: 12px;
            cursor: pointer;
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .sidebar ul li:hover {
            background: #2a5298;
        }

        /* Main */

        .main {
            margin-left: 250px;
            padding: 20px;
        }

        /* Topbar */

        .topbar {
            background: white;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Cards */

        .card-box {
            padding: 20px;
            border-radius: 10px;
            background: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .sidebar a {
            text-decoration: none;
            display: block;
            padding: 12px;
            border-radius: 6px;
        }

        .sidebar a:hover {
            background: #2a5298;
        }
    </style>

</head>

<body>


    <!-- Sidebar -->
    <div class="sidebar">

        <h4>DMCMS</h4>

        <ul>

            <li>
                <a href="dashboard.html" class="nav-link text-white">
                    <i class="bi bi-speedometer2"></i> Dashboard
                </a>
            </li>

            <li>
                <a href="users.html" class="nav-link text-white">
                    <i class="bi bi-people"></i> Users
                </a>
            </li>

            <li>
                <a href="campaigns.html" class="nav-link text-white">
                    <i class="bi bi-megaphone"></i> Campaigns
                </a>
            </li>

            <li onclick="logout()">
                <i class="bi bi-box-arrow-right"></i> Logout
            </li>

        </ul>

    </div>

    <!-- Main -->
    <div class="main">

        <!-- Topbar -->
        <div class="topbar">

            <h5>Admin Dashboard</h5>

            <div>
                <i class="bi bi-bell"></i>
                <span class="ms-3">Admin</span>
            </div>

        </div>


        <!-- Cards -->
        <div class="row mt-4">

            <div class="col-md-3">
                <div class="card-box">
                    <h6>Total Users</h6>
                    <h3 id="totalUsers">0</h3>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card-box">
                    <h6>Total Marketers</h6>
                    <h3 id="totalMarketers">0</h3>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card-box">
                    <h6>Total Admins</h6>
                    <h3 id="totalAdmins">0</h3>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card-box">
                    <h6>Total Revenue</h6>
                    <h3 id="totalRevenue">0</h3>
                </div>
            </div>

        </div>


        <!-- Recent Users -->
        <div class="card mt-4">

            <div class="card-header">
                Recent Users
            </div>

            <div class="card-body">

                <table class="table table-hover">

                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Status</th>
                        </tr>
                    </thead>

                    <tbody id="usersTable">

                    </tbody>

                </table>

            </div>

        </div>


    </div>


    <script src="js/dashboard.js"></script>

    <script>

        function logout() {

            localStorage.removeItem("token");
            localStorage.removeItem("user");

            window.location.href = "../auth/login.html";

        }

    </script>

</body>

</html>
